<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0824"/>
    </linearGradient>
    <linearGradient id="mon" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="monHL" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="kbd" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="stnd" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.45"/>
    </filter>
    <filter id="blob" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="scrClip">
      <rect x="136" y="30" width="128" height="88" rx="5" ry="5"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- Twinkling stars -->
  <circle cx="30" cy="18" r="1.2" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="370" cy="22" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="55" cy="40" r="0.8" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4.1s" repeatCount="indefinite"/></circle>
  <circle cx="348" cy="55" r="1.1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="88" cy="15" r="0.9" fill="#a5f3fc" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="315" cy="12" r="1.3" fill="#c4b5fd" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="22" cy="80" r="0.9" fill="white" opacity="0.3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="375" cy="90" r="1" fill="#fde68a" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="110" cy="170" r="0.8" fill="#f472b6" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="290" cy="175" r="1" fill="#34d399" opacity="0.4"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="4.4s" repeatCount="indefinite"/></circle>

  <!-- Ambient glow blob -->
  <ellipse cx="200" cy="108" rx="85" ry="48" fill="#06b6d4" opacity="0.09" filter="url(#blob)">
    <animate attributeName="opacity" values="0.09;0.18;0.09" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ── FLOATING COMPUTER ── -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0.05 0.55 0.95;0.45 0.05 0.55 0.95"/>

    <!-- Monitor outer body -->
    <rect x="120" y="18" width="160" height="112" rx="16" ry="16" fill="url(#mon)" stroke="#0e7490" stroke-width="4"/>
    <!-- Top gloss highlight -->
    <rect x="126" y="23" width="148" height="36" rx="10" ry="10" fill="url(#monHL)"/>
    <!-- Bottom bezel bar -->
    <rect x="120" y="114" width="160" height="16" rx="8" ry="8" fill="#0e7490"/>

    <!-- Screen -->
    <rect x="136" y="30" width="128" height="88" rx="6" ry="6" fill="url(#scr)" stroke="#164e63" stroke-width="2"/>

    <!-- Screen content (clipped) -->
    <g clip-path="url(#scrClip)">
      <rect x="144" y="40" height="6" rx="3" ry="3" fill="#22d3ee" opacity="0.9">
        <animate attributeName="width" values="0;70;70" dur="1.2s" fill="freeze" begin="0s"/>
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="152" y="52" height="6" rx="3" ry="3" fill="#a78bfa" opacity="0.85">
        <animate attributeName="width" values="0;90;90" dur="1.2s" fill="freeze" begin="0.3s"/>
        <animate attributeName="opacity" values="0.85;0.3;0.85" dur="2.7s" begin="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="152" y="64" height="6" rx="3" ry="3" fill="#34d399" opacity="0.8">
        <animate attributeName="width" values="0;55;55" dur="1.2s" fill="freeze" begin="0.6s"/>
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.4s" begin="1.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="144" y="76" height="6" rx="3" ry="3" fill="#f472b6" opacity="0.8">
        <animate attributeName="width" values="0;80;80" dur="1.2s" fill="freeze" begin="0.9s"/>
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" begin="2.1s" repeatCount="indefinite"/>
      </rect>
      <rect x="152" y="88" height="6" rx="3" ry="3" fill="#fbbf24" opacity="0.75">
        <animate attributeName="width" values="0;45;45" dur="1.2s" fill="freeze" begin="1.1s"/>
        <animate attributeName="opacity" values="0.75;0.25;0.75" dur="4s" begin="2.3s" repeatCount="indefinite"/>
      </rect>
      <rect x="144" y="100" height="6" rx="3" ry="3" fill="#22d3ee" opacity="0.7">
        <animate attributeName="width" values="0;60;60" dur="1.2s" fill="freeze" begin="1.3s"/>
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" begin="2.5s" repeatCount="indefinite"/>
      </rect>
      <!-- Blinking cursor -->
      <rect x="214" y="100" width="6" height="7" rx="1" ry="1" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Screen glow rim -->
    <rect x="136" y="30" width="128" height="88" rx="6" ry="6" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.3" filter="url(#glow)"/>

    <!-- Stand neck -->
    <rect x="188" y="130" width="24" height="18" rx="4" ry="4" fill="url(#stnd)" stroke="#0e7490" stroke-width="3"/>

    <!-- Base -->
    <rect x="158" y="147" width="84" height="13" rx="7" ry="7" fill="url(#mon)" stroke="#0e7490" stroke-width="3"/>
    <rect x="164" y="156" width="72" height="4" rx="2" ry="2" fill="#0891b2" opacity="0.5"/>

    <!-- Keyboard -->
    <rect x="145" y="163" width="110" height="22" rx="7" ry="7" fill="url(#kbd)" stroke="#0e7490" stroke-width="3"/>
    <rect x="149" y="166" width="102" height="7" rx="3" ry="3" fill="white" opacity="0.14"/>
    <!-- Keys row 1 -->
    <rect x="151" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="162" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="173" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="184" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="195" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="206" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="217" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="228" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <rect x="239" y="168" width="8" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>
    <!-- Spacebar -->
    <rect x="168" y="176" width="64" height="5" rx="2" ry="2" fill="#164e63" opacity="0.65"/>

    <!-- Cartoon eyes on bezel -->
    <circle cx="172" cy="24" r="5" fill="white" stroke="#0e7490" stroke-width="1.5"/>
    <circle cx="228" cy="24" r="5" fill="white" stroke="#0e7490" stroke-width="1.5"/>
    <circle cx="173" cy="25" r="2.5" fill="#1e1b4b">
      <animate attributeName="cx" values="173;174;173;172;173" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="229" cy="25" r="2.5" fill="#1e1b4b">
      <animate attributeName="cx" values="229;230;229;228;229" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Eye shines -->
    <circle cx="174" cy="23" r="1" fill="white" opacity="0.8"/>
    <circle cx="230" cy="23" r="1" fill="white" opacity="0.8"/>
    <!-- Smile -->
    <path d="M186,124 Q200,133 214,124" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Rosy cheeks -->
    <circle cx="176" cy="126" r="5" fill="#f472b6" opacity="0.35"/>
    <circle cx="224" cy="126" r="5" fill="#f472b6" opacity="0.35"/>
  </g>

  <!-- ── FLOATING PARTICLES ── -->
  <circle cx="68" cy="75" r="5" fill="#22d3ee" opacity="0.7" filter="url(#glow)">
    <animate attributeName="cy" values="75;50;75" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;3;5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="130" r="4" fill="#a78bfa" opacity="0.65">
    <animate attributeName="cy" values="130;108;130" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.65;0.1;0.65" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="95" cy="155" r="3" fill="#34d399" opacity="0.6">
    <animate attributeName="cy" values="155;138;155" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="332" cy="68" r="5" fill="#f472b6" opacity="0.7" filter="url(#glow)">
    <animate attributeName="cy" values="68;44;68" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;3;5" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="358" cy="120" r="4" fill="#fbbf24" opacity="0.6">
    <animate attributeName="cy" values="120;98;120" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="155" r="3" fill="#22d3ee" opacity="0.55">
    <animate attributeName="cy" values="155;137;155" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.1;0.55" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Sparkle stars -->
  <g transform="translate(75,40)">
    <polygon points="0,-6 1.8,0 6,0 3,3.6 4.2,8 0,5 -4.2,8 -3,3.6 -6,0 -1.8,0" fill="#fde68a" opacity="0.9" filter="url(#glow)">
      <animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(325,45)">
    <polygon points="0,-6 1.8,0 6,0 3,3.6 4.2,8 0,5 -4.2,8 -3,3.6 -6,0 -1.8,0" fill="#c4b5fd" opacity="0.85" filter="url(#glow)">
      <animate attributeName="opacity" values="0.85;0.1;0.85" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(48,165)">
    <polygon points="0,-5 1.5,0 5,0 2.5,3 3.5,7 0,4.2 -3.5,7 -2.5,3 -5,0 -1.5,0" fill="#34d399" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(352,165)">
    <polygon points="0,-5 1.5,0 5,0 2.5,3 3.5,7 0,4.2 -3.5,7 -2.5,3 -5,0 -1.5,0" fill="#f472b6" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.15;0.8" dur="2.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- Bottom text -->
  <text x="200" y="196" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#67e8f9" letter-spacing="3" opacity="0.75">&lt; KEEP CODING /&gt;</text>
</svg>
