<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <!-- Sky gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d0824"/>
    </linearGradient>

    <!-- Monitor body gradient - chunky cartoon teal/blue -->
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Monitor highlight -->
    <linearGradient id="monitorHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Screen gradient -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Keyboard gradient -->
    <linearGradient id="keyboardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>

    <!-- Stand gradient -->
    <linearGradient id="standGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="screenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#06b6d4" flood-opacity="0.4"/>
    </filter>

    <!-- Star glow -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blob glow -->
    <filter id="blobGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for screen content -->
    <clipPath id="screenClip">
      <rect x="136" y="30" width="128" height="88" rx="4"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="400" height="200" fill="url(#bgGrad)"/>

  <!-- Stars in background -->
  <circle cx="30" cy="18" r="1.2" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="22" r="1" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="40" r="0.8" fill="white" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="4.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="348" cy="55" r="1.1" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="88" cy="15" r="0.9" fill="#a5f3fc" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="315" cy="12" r="1.3" fill="#c4b5fd" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="80" r="0.9" fill="white" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="375" cy="90" r="1" fill="#fde68a" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Ambient blob glow behind computer -->
  <ellipse cx="200" cy="110" rx="90" ry="50" fill="#06b6d4" opacity="0.07" filter="url(#blobGlow)">
    <animate attributeName="opacity" values="0.07;0.14;0.07" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ── FLOATING COMPUTER (bobs up and down) ── -->
  <g filter="url(#shadow)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0.05 0.55 0.95; 0.45 0.05 0.55 0.95"/>

    <!-- ── MONITOR BODY (chunky rounded rect, cartoon outline) ── -->
    <rect x="120" y="18" width="160" height="112" rx="16" fill="url(#monitorGrad)" stroke="#0e7490" stroke-width="4"/>
    <!-- Top highlight stripe -->
    <rect x="124" y="22" width="152" height="40" rx="12" fill="url(#monitorHighlight)"/>
    <!-- Cartoon thick bottom border -->
    <rect x="120" y="114" width="160" height="16" rx="0" fill="#0e7490" rx="8"/>

    <!-- ── SCREEN ── -->
    <rect x="136" y="30" width="128" height="88" rx="6" fill="url(#screenGrad)" stroke="#164e63" stroke-width="2"/>

    <!-- ── SCREEN CONTENT: animated code lines ── -->
    <g clip-path="url(#screenClip)">
      <!-- Code line 1 -->
      <rect x="144" y="40" height="6" rx="3" fill="#22d3ee" opacity="0.9">
        <animate attributeName="width" values="0;70;70" dur="1.2s" fill="freeze" begin="0s"/>
        <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" begin="1.2s" repeatCount="indefinite"/>
      </rect>
      <!-- Code line 2 -->
      <rect x="152" y="52" height="6" rx="3" fill="#a78bfa" opacity="0.85">
        <animate attributeName="width" values="0;90;90" dur="1.2s" fill="freeze" begin="0.3s"/>
        <animate attributeName="opacity" values="0.85;0.3;0.85" dur="2.7s" begin="1.5s" repeatCount="indefinite"/>
      </rect>
      <!-- Code line 3 -->
      <rect x="152" y="64" height="6" rx="3" fill="#34d399" opacity="0.8">
        <animate attributeName="width" values="0;55;55" dur="1.2s" fill="freeze" begin="0.6s"/>
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.4s" begin="1.8s" repeatCount="indefinite"/>
      </rect>
      <!-- Code line 4 -->
      <rect x="144" y="76" height="6" rx="3" fill="#f472b6" opacity="0.8">
        <animate attributeName="width" values="0;80;80" dur="1.2s" fill="freeze" begin="0.9s"/>
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" begin="2.1s" repeatCount="indefinite"/>
      </rect>
      <!-- Code line 5 -->
      <rect x="152" y="88" height="6" rx="3" fill="#fbbf24" opacity="0.75">
        <animate attributeName="width" values="0;45;45" dur="1.2s" fill="freeze" begin="1.1s"/>
        <animate attributeName="opacity" values="0.75;0.25;0.75" dur="4s" begin="2.3s" repeatCount="indefinite"/>
      </rect>
      <!-- Code line 6 -->
      <rect x="144" y="100" height="6" rx="3" fill="#22d3ee" opacity="0.7">
        <animate attributeName="width" values="0;60;60" dur="1.2s" fill="freeze" begin="1.3s"/>
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" begin="2.5s" repeatCount="indefinite"/>
      </rect>

      <!-- Blinking cursor -->
      <rect x="214" y="100" width="6" height="7" rx="1" fill="#22d3ee">
        <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
      </rect>

      <!-- Screen scanline overlay -->
      <rect x="136" y="30" width="128" height="88" rx="6" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.15"/>
    </g>

    <!-- Screen inner glow rim -->
    <rect x="136" y="30" width="128" height="88" rx="6" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.35" filter="url(#screenGlow)"/>

    <!-- ── MONITOR STAND (neck) ── -->
    <rect x="188" y="130" width="24" height="18" rx="4" fill="url(#standGrad)" stroke="#0e7490" stroke-width="3"/>

    <!-- ── BASE ── -->
    <rect x="158" y="147" width="84" height="14" rx="8" fill="url(#monitorGrad)" stroke="#0e7490" stroke-width="3"/>
    <!-- Base shadow line -->
    <rect x="162" y="157" width="76" height="4" rx="3" fill="#0891b2" opacity="0.5"/>

    <!-- ── KEYBOARD ── -->
    <rect x="145" y="164" width="110" height="22" rx="7" fill="url(#keyboardGrad)" stroke="#0e7490" stroke-width="3"/>
    <!-- Keyboard highlight -->
    <rect x="149" y="167" width="102" height="8" rx="4" fill="white" opacity="0.15"/>
    <!-- Key rows -->
    <rect x="151" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="162" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="173" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="184" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="195" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="206" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="217" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="228" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <rect x="239" y="169" width="8" height="5" rx="2" fill="#164e63" opacity="0.6"/>
    <!-- Spacebar -->
    <rect x="168" y="177" width="64" height="5" rx="2" fill="#164e63" opacity="0.6"/>

    <!-- ── CARTOON FACE on monitor ── -->
    <!-- Eyes (on the screen bezel) -->
    <circle cx="172" cy="24" r="5" fill="white" stroke="#0e7490" stroke-width="1.5"/>
    <circle cx="228" cy="24" r="5" fill="white" stroke="#0e7490" stroke-width="1.5"/>
    <circle cx="173" cy="25" r="2.5" fill="#1e1b4b">
      <animate attributeName="cx" values="173;174;173;172;173" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="229" cy="25" r="2.5" fill="#1e1b4b">
      <animate attributeName="cx" values="229;230;229;228;229" dur="4s" repeatCount="indefinite"/>
    </circle>
    <!-- Eye shine -->
    <circle cx="174" cy="23" r="1" fill="white" opacity="0.8"/>
    <circle cx="230" cy="23" r="1" fill="white" opacity="0.8"/>

    <!-- Smile -->
    <path d="M186,124 Q200,133 214,124" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Rosy cheeks -->
    <circle cx="176" cy="126" r="5" fill="#f472b6" opacity="0.35"/>
    <circle cx="224" cy="126" r="5" fill="#f472b6" opacity="0.35"/>

  </g>
  <!-- end float group -->

  <!-- ── FLOATING PARTICLES ── -->
  <!-- Left side -->
  <circle cx="68" cy="75" r="5" fill="#22d3ee" opacity="0.7" filter="url(#starGlow)">
    <animate attributeName="cy" values="75;50;75" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;3;5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="130" r="4" fill="#a78bfa" opacity="0.65">
    <animate attributeName="cy" values="130;108;130" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.65;0.1;0.65" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="95" cy="155" r="3" fill="#34d399" opacity="0.6">
    <animate attributeName="cy" values="155;138;155" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Right side -->
  <circle cx="332" cy="68" r="5" fill="#f472b6" opacity="0.7" filter="url(#starGlow)">
    <animate attributeName="cy" values="68;44;68" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;3;5" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="358" cy="120" r="4" fill="#fbbf24" opacity="0.6">
    <animate attributeName="cy" values="120;98;120" dur="3.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="155" r="3" fill="#22d3ee" opacity="0.55">
    <animate attributeName="cy" values="155;137;155" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.1;0.55" dur="4.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Sparkle stars -->
  <g transform="translate(75,40)">
    <polygon points="0,-6 1.8,0 6,0 3,3.6 4.2,8 0,5 -4.2,8 -3,3.6 -6,0 -1.8,0" fill="#fde68a" opacity="0.9" filter="url(#starGlow)">
      <animate attributeName="opacity" values="0.9;0.1;0.9" dur="2.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="6s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(325,45)">
    <polygon points="0,-6 1.8,0 6,0 3,3.6 4.2,8 0,5 -4.2,8 -3,3.6 -6,0 -1.8,0" fill="#c4b5fd" opacity="0.85" filter="url(#starGlow)">
      <animate attributeName="opacity" values="0.85;0.1;0.85" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(48,165)">
    <polygon points="0,-5 1.5,0 5,0 2.5,3 3.5,7 0,4.2 -3.5,7 -2.5,3 -5,0 -1.5,0" fill="#34d399" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="3.6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="7s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <g transform="translate(352,170)">
    <polygon points="0,-5 1.5,0 5,0 2.5,3 3.5,7 0,4.2 -3.5,7 -2.5,3 -5,0 -1.5,0" fill="#f472b6" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.15;0.8" dur="2.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="4.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ── BOTTOM TEXT ── -->
  <text x="200" y="195" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="9" fill="#67e8f9"
    letter-spacing="3" opacity="0.75">
    &lt; KEEP CODING /&gt;
  </text>
</svg>
